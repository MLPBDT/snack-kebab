<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snack Bosphore</title>
<meta name="description" content="Kebab artisanal, viande grillée minute, pain maison. Livraison 30 min ou à emporter." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0E0E0E; height: 100%; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  #loading {
    position: fixed; inset: 0; background: #0E0E0E;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 9999;
    font-family: 'Inter', sans-serif; color: #fff;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #E63946; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;opacity:0.5">Chargement du menu…</div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">
const SITE_TWEAKS = {
  name: "Snack Bosphore",
  tagline: "Le vrai goût, depuis 2008",
  palette: "street",
  fontPair: "sans-bold",
  radius: 14,
  heroTitle1: "snack",
  heroTitle2: "qui fait la diff.",
  heroSub: "Viande grillée minute, pain maison cuit sur place, sauces fait-maison. Livraison en 30 min ou à emporter — tu choisis.",
  aboutTitle: "Une recette, une famille, une obsession.",
  aboutText: "Depuis 2008, on broche notre viande chaque matin, on pétrit notre pain à la main et on fait nos sauces sur place. Pas de surgelé, pas de raccourci. Juste le vrai goût du kebab, comme à la maison.",
  address: "12 rue des Halles\n75001 Paris",
  phone: "01 23 45 67 89",
  menu: null,
  compose: null,
};

async function loadAndMount() {
  // Attendre que SnackSite soit disponible
  await new Promise(resolve => {
    const check = () => window.SnackSite ? resolve() : setTimeout(check, 30);
    check();
  });

  // Charger les données depuis l'API
  try {
    const res = await fetch('/api/get-menu');
    const data = await res.json();
    // Merge tout — menu, compose, photos, name, etc.
    if (data && typeof data === 'object') {
      Object.keys(data).forEach(key => {
        SITE_TWEAKS[key] = data[key];
      });
    }
  } catch (e) {
    console.warn('API indisponible, données par défaut utilisées');
  }

  // Cacher le loader
  document.getElementById('loading').style.display = 'none';

  // Monter le site
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(window.SnackSite, { tweaks: SITE_TWEAKS, mode: 'desktop' })
  );
}

loadAndMount();
</script>
</body>
</html>
